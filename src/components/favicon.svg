<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#1a1a1a"/>
  <!-- Two rounded squares perfectly overlapping = zero drift -->
  <!-- Figma side (purple) -->
  <rect x="16" y="16" width="24" height="24" rx="6" fill="#A259FF"/>
  <!-- Code side (blue) -->
  <rect x="24" y="24" width="24" height="24" rx="6" fill="#1ABCFE"/>
  <!-- Overlap area: white, the sync point -->
  <rect x="24" y="24" width="16" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
</svg>
