<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gitma — Design System</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◎</text></svg>">
<!-- GITMA_DATA -->
<style>
  :root {
    --g-bg: #f5f5f5; --g-bg-white: #fff; --g-border: #e5e5e5;
    --g-text: #1a1a1a; --g-text-muted: #999; --g-text-dim: #666;
    --g-accent: #6d28d9; --g-accent-bg: #f3ecff;
    --g-hover: #f5f5f5; --g-active: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--g-bg); color: var(--g-text); overflow: hidden; height: 100vh; }

  /* Shell */
  .shell { display: grid; height: 100vh; overflow: hidden; }
  .shell--list { grid-template-columns: 260px 1fr; }
  .shell--component { grid-template-columns: 260px 1fr 320px; }
  .shell--tokens { grid-template-columns: 240px 1fr; }

  .col-left { background: var(--g-bg-white); border-right: 1px solid var(--g-border); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; height: 100vh; }
  .col-center { overflow-y: auto; height: 100vh; position: relative; }
  .col-right { background: var(--g-bg-white); border-left: 1px solid var(--g-border); overflow-y: auto; height: 100vh; font-size: 11px; }

  /* Shared sidebar */
  .back-btn { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--g-text-dim); cursor: pointer; padding: 4px 0; margin-bottom: 12px; border: none; background: none; }
  .back-btn:hover { color: var(--g-text); }
  .nav-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--g-text-muted); padding: 12px 0 4px; }
  .nav-list { list-style: none; }
  .nav-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; }
  .nav-item:hover { background: var(--g-hover); }
  .nav-item-name { font-size: 13px; font-weight: 500; }
  .nav-item-meta { font-size: 10px; color: var(--g-text-muted); }
  .powered { margin-top: auto; padding-top: 16px; border-top: 1px solid #eee; text-align: center; }
  .powered a { font-size: 10px; color: var(--g-text-muted); text-decoration: none; }
  .powered a span { font-weight: 600; color: var(--g-text-dim); }
  .powered a:hover span { color: var(--g-text); }
  .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }

  /* Controls */
  .control { margin-bottom: 14px; }
  .control label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--g-text-dim); margin-bottom: 5px; }
  .control input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px; outline: none; }
  .control input[type="text"]:focus { border-color: var(--g-text-muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 3px; }
  .chip { padding: 3px 8px; border-radius: 100px; font-size: 10px; border: 1px solid #ddd; background: var(--g-bg-white); cursor: pointer; user-select: none; }
  .chip:hover { border-color: var(--g-text-muted); }
  .chip.active { background: var(--g-active); color: #fff; border-color: var(--g-active); }
  .toggle-row { display: flex; align-items: center; gap: 6px; }
  .toggle { width: 28px; height: 16px; border-radius: 8px; background: #ddd; cursor: pointer; position: relative; }
  .toggle.active { background: var(--g-active); }
  .toggle::after { content:''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform 0.15s; }
  .toggle.active::after { transform: translateX(12px); }
  .toggle-label { font-size: 11px; }

  /* Center */
  .preview-area { display: flex; align-items: center; justify-content: center; padding: 2rem; min-height: calc(100vh - 60px); background: var(--g-bg-white); }
  .preview-label { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; position: absolute; top: 12px; left: 16px; }
  .empty-center { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--g-bg-white); }
  .empty-center h2 { font-size: 18px; color: #333; margin-bottom: 4px; }
  .empty-center p { font-size: 13px; color: var(--g-text-muted); }

  /* Component card (generic preview) */
  .comp-card { background: var(--g-bg-white); border: 1px solid var(--g-border); border-radius: 12px; padding: 32px; min-width: 360px; max-width: 560px; }
  .comp-card-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .comp-card-desc { font-size: 12px; color: var(--g-text-muted); margin-bottom: 16px; }
  .comp-card-section { margin-bottom: 12px; }
  .comp-card-section-title { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--g-text-muted); margin-bottom: 6px; }
  .comp-card-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
  .comp-card-prop { color: var(--g-text-dim); min-width: 80px; font-family: monospace; font-size: 11px; }
  .comp-card-value { font-family: monospace; font-size: 11px; color: var(--g-accent); background: var(--g-accent-bg); padding: 1px 6px; border-radius: 3px; }

  /* Inspect panel */
  .inspect-section-header { padding: 10px 16px 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--g-text-muted); border-bottom: 1px solid #f0f0f0; background: #fafafa; }
  .inspect-section-body { padding: 10px 16px 14px; border-bottom: 1px solid #eee; }
  .inspect-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid #f8f8f8; gap: 8px; }
  .inspect-row:last-child { border-bottom: none; }
  .inspect-prop { width: 90px; color: var(--g-text-muted); flex-shrink: 0; font-size: 11px; }
  .inspect-value { font-family: monospace; font-size: 11px; }
  .inspect-token { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--g-accent); background: var(--g-accent-bg); padding: 2px 6px; border-radius: 3px; font-family: monospace; word-break: break-all; }
  .inspect-swatch { width: 10px; height: 10px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }

  /* Code dock */
  .code-dock { position: fixed; bottom: 0; z-index: 10; background: #1a1a1a; border-top: 1px solid #333; display: none; }
  .code-dock.show { display: block; }
  .code-dock-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; }
  .code-dock-header span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; }
  .code-dock-left { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .code-dock-left:hover span { color: #999; }
  .code-copy { padding: 3px 8px; font-size: 10px; color: #999; background: #2a2a2a; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
  .code-copy:hover { color: #fff; border-color: #666; }
  .code-copy.copied { color: #4ade80; border-color: #4ade80; }
  .code-dock-body { padding: 12px 18px; max-height: 280px; overflow-y: auto; }
  .code-panel { color: #e5e5e5; font-family: "SF Mono","Fira Code",monospace; font-size: 11px; line-height: 1.5; white-space: pre; margin: 0; }
  .kw { color: #c792ea; } .str { color: #c3e88d; } .comp { color: #82aaff; } .prop { color: #f78c6c; } .tag { color: #89ddff; }

  /* Token page */
  .token-main { padding: 32px; }
  .token-stats { display: flex; gap: 12px; margin-bottom: 24px; }
  .token-stat { background: var(--g-bg-white); border-radius: 8px; padding: 12px 16px; flex: 1; }
  .token-stat-value { font-size: 20px; font-weight: 600; }
  .token-stat-label { font-size: 10px; color: var(--g-text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .color-scale { display: flex; gap: 1px; border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
  .color-scale-item { flex: 1; height: 48px; position: relative; cursor: pointer; transition: transform 0.15s; }
  .color-scale-item:hover { transform: scaleY(1.15); z-index: 1; }
  .color-scale-label { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 8px; font-weight: 600; opacity: 0; transition: opacity 0.15s; }
  .color-scale-item:hover .color-scale-label { opacity: 1; }
  .token-grid { display: flex; flex-direction: column; gap: 1px; background: #eee; border-radius: 8px; overflow: hidden; }
  .token-row { display: grid; grid-template-columns: 1fr 140px 140px 40px; align-items: center; padding: 10px 16px; background: var(--g-bg-white); gap: 12px; }
  .token-row.header { background: #fafafa; position: sticky; top: 0; z-index: 1; }
  .token-row.header span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--g-text-muted); }
  .token-name { font-family: monospace; font-size: 12px; }
  .token-path { font-size: 10px; color: var(--g-text-muted); margin-top: 1px; }
  .token-desc { font-size: 10px; color: var(--g-accent); margin-top: 2px; font-style: italic; }
  .token-value { font-family: monospace; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .token-swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.08); flex-shrink: 0; }
  .token-hex { color: #555; }
  .token-copy { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; cursor: pointer; border-radius: 4px; color: #ccc; }
  .token-copy:hover { background: #f0f0f0; color: #666; }
  .token-copy.copied { color: #4ade80; }
  .token-copy svg { width: 14px; height: 14px; }
  .mode-toggle { display: flex; gap: 2px; background: #f0f0f0; border-radius: 6px; padding: 2px; margin-bottom: 14px; }
  .mode-btn { flex: 1; padding: 5px; text-align: center; font-size: 11px; border: none; background: transparent; border-radius: 4px; cursor: pointer; color: #666; }
  .mode-btn.active { background: var(--g-bg-white); color: var(--g-text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .cat-item { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #444; display: flex; align-items: center; justify-content: space-between; }
  .cat-item:hover { background: var(--g-hover); }
  .cat-item.active { background: var(--g-active); color: #fff; }
  .cat-count { font-size: 10px; color: var(--g-text-muted); }
  .cat-item.active .cat-count { color: #888; }
  .token-empty { text-align: center; padding: 48px; color: var(--g-text-muted); }
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="icon-arrow-left" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="13" y1="8" x2="3" y2="8"/><polyline points="7,4 3,8 7,12"/></symbol>
  <symbol id="icon-copy" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="8" height="8" rx="1.5"/><path d="M3 11V3h8"/></symbol>
</svg>

<div class="shell shell--list" id="shell">
  <aside class="col-left" id="sidebar"></aside>
  <main class="col-center" id="center"></main>
  <aside class="col-right" id="rightpanel" style="display:none;"></aside>
</div>

<div class="code-dock" id="code-dock">
  <div class="code-dock-header">
    <div class="code-dock-left" onclick="toggleDock()"><span>Code</span><span id="dock-arrow" style="font-size:14px;color:#555">&#9660;</span></div>
    <button class="code-copy" id="copy-btn" onclick="copyCode()">Copy</button>
  </div>
  <div class="code-dock-body" id="dock-body"><div class="code-panel" id="code-output"></div></div>
</div>

<script>
// ==================== STATE ====================
let currentPage = "list";
let selectedComponent = null; // ComponentSchema
let componentState = {};       // current prop/variant values
let tokenMode = null;          // first mode name
let tokenCat = null;
let tokenSearch = "";
let dockOpen = true;

// Init mode from token data
const allModes = [];
for (const col of Object.values(GITMA_TOKEN_DATA)) {
  for (const m of col.modes) {
    if (!allModes.includes(m.name)) allModes.push(m.name);
  }
}
tokenMode = allModes[0] || "Light";

// ==================== NAVIGATION ====================
function showPage(id, compName) {
  currentPage = id;
  const shell = document.getElementById("shell");
  const right = document.getElementById("rightpanel");
  const dock = document.getElementById("code-dock");

  if (id === "list") {
    shell.className = "shell shell--list";
    right.style.display = "none";
    dock.classList.remove("show");
    dock.style.left = "260px"; dock.style.right = "0";
    selectedComponent = null;
    renderListSidebar();
    renderListCenter();
  } else if (id === "tokens") {
    shell.className = "shell shell--tokens";
    right.style.display = "none";
    dock.classList.remove("show");
    dock.style.left = "240px"; dock.style.right = "0";
    renderTokenSidebar();
    renderTokenCenter();
  } else if (id === "component") {
    selectedComponent = GITMA_COMPONENTS.find(c => c.name === compName);
    if (!selectedComponent) return;
    initComponentState(selectedComponent);
    shell.className = "shell shell--component";
    right.style.display = "";
    dock.classList.add("show");
    dock.style.left = "260px"; dock.style.right = "320px";
    renderComponentSidebar();
    renderComponentCenter();
    renderComponentInspect();
    updateComponentCode();
  }
}

// ==================== LIST PAGE ====================
function renderListSidebar() {
  const hasTokens = Object.keys(GITMA_TOKEN_DATA).length > 0;
  const totalTokens = getAllTokens().length;

  let html = `
    <h1 style="font-size:16px;margin-bottom:2px;">Gitma</h1>
    <p style="font-size:11px;color:#999;margin-bottom:16px;">Design System Preview</p>
    <hr class="divider">`;

  if (hasTokens) {
    html += `<div class="nav-section">Foundations</div>
    <ul class="nav-list"><li class="nav-item" onclick="showPage('tokens')">
      <div class="nav-item-name">Design Tokens</div>
      <div class="nav-item-meta">${totalTokens} tokens, ${allModes.join("/")}</div>
    </li></ul>`;
  }

  if (GITMA_COMPONENTS.length > 0) {
    html += `<div class="nav-section">Components</div><ul class="nav-list">`;
    for (const c of GITMA_COMPONENTS) {
      const meta = describeComponent(c);
      html += `<li class="nav-item" onclick="showPage('component','${esc(c.name)}')">
        <div class="nav-item-name">${esc(c.name)}</div>
        <div class="nav-item-meta">${esc(meta)}</div>
      </li>`;
    }
    html += `</ul>`;
  }

  html += `<div class="powered"><a href="https://github.com/lucadebort/gitma" target="_blank">POWERED BY <span>GITMA</span></a></div>`;
  document.getElementById("sidebar").innerHTML = html;
}

function renderListCenter() {
  if (GITMA_COMPONENTS.length === 0 && Object.keys(GITMA_TOKEN_DATA).length === 0) {
    document.getElementById("center").innerHTML = `<div class="empty-center"><div style="text-align:center"><h2>No data</h2><p>Run gitma to pull from Figma first.</p></div></div>`;
    return;
  }
  document.getElementById("center").innerHTML = `<div class="empty-center"><div style="text-align:center"><h2>Select a component</h2><p>Click from the sidebar to preview.</p></div></div>`;
}

// ==================== GENERIC COMPONENT ====================
function initComponentState(comp) {
  componentState = {};
  for (const p of comp.props || []) {
    if (p.type === "string") componentState[p.name] = p.defaultValue || p.name;
    else if (p.type === "number") componentState[p.name] = p.defaultValue || 0;
    else if (p.type === "boolean") componentState[p.name] = p.defaultValue !== undefined ? p.defaultValue : true;
    else if (p.type === "enum") componentState[p.name] = p.defaultValue || (p.values && p.values[0]) || "";
  }
  for (const v of comp.variants || []) {
    componentState["variant:" + v.name] = v.defaultValue || (v.values && v.values[0]) || "";
  }
  for (const s of comp.states || []) {
    componentState["state:" + s.name] = false;
  }
}

function renderComponentSidebar() {
  const c = selectedComponent;
  let html = `
    <button class="back-btn" onclick="showPage('list')"><svg width="12" height="12"><use href="#icon-arrow-left"/></svg> All</button>
    <h1 style="font-size:16px;margin-bottom:4px;">${esc(c.name)}</h1>`;

  if (c.description) html += `<p style="font-size:11px;color:#999;margin-bottom:8px;">${esc(c.description)}</p>`;
  html += `<p style="font-size:10px;color:#999;margin-bottom:14px;">${esc(describeComponent(c))}</p><hr class="divider">`;

  // Variants
  for (const v of c.variants || []) {
    const current = componentState["variant:" + v.name];
    html += `<div class="control"><label>${esc(v.name)}</label><div class="chips">`;
    for (const val of v.values || []) {
      const active = current === val ? " active" : "";
      html += `<div class="chip${active}" onclick="setVar('variant:${esc(v.name)}','${esc(val)}')">${esc(val)}</div>`;
    }
    html += `</div></div>`;
  }

  // Props
  for (const p of c.props || []) {
    if (p.type === "callback" || p.type === "object" || p.type === "node") continue;
    if (p.type === "string") {
      html += `<div class="control"><label>${esc(p.name)}</label><input type="text" value="${esc(String(componentState[p.name] || ''))}" oninput="setProp('${esc(p.name)}',this.value)"></div>`;
    } else if (p.type === "number") {
      html += `<div class="control"><label>${esc(p.name)}</label><input type="text" value="${componentState[p.name] || 0}" oninput="setProp('${esc(p.name)}',Number(this.value)||0)"></div>`;
    } else if (p.type === "boolean") {
      const active = componentState[p.name] ? " active" : "";
      html += `<div class="control"><label>${esc(p.name)}</label><div class="toggle-row"><div class="toggle${active}" onclick="setProp('${esc(p.name)}',!componentState['${esc(p.name)}'])"></div><span class="toggle-label">${componentState[p.name] ? "On" : "Off"}</span></div></div>`;
    } else if (p.type === "enum") {
      const current = componentState[p.name];
      html += `<div class="control"><label>${esc(p.name)}</label><div class="chips">`;
      for (const val of p.values || []) {
        const active = current === val ? " active" : "";
        html += `<div class="chip${active}" onclick="setProp('${esc(p.name)}','${esc(val)}')">${esc(val)}</div>`;
      }
      html += `</div></div>`;
    }
  }

  // States
  if (c.states && c.states.length) {
    html += `<hr class="divider"><div class="control"><label>States</label><div style="display:flex;flex-direction:column;gap:6px">`;
    for (const s of c.states) {
      const active = componentState["state:" + s.name] ? " active" : "";
      html += `<div class="toggle-row"><div class="toggle${active}" onclick="setVar('state:${esc(s.name)}',!componentState['state:${esc(s.name)}'])"></div><span class="toggle-label">${esc(s.name)}</span></div>`;
    }
    html += `</div></div>`;
  }

  // Slots
  if (c.slots && c.slots.length) {
    html += `<hr class="divider"><div class="control"><label>Slots</label>`;
    for (const s of c.slots) {
      html += `<div style="font-size:11px;padding:4px 0;color:#666">${esc(s.name)}${s.required ? ' <span style="color:#e63535">*</span>' : ''}${s.allowedComponents?.length ? ' <span style="color:#999">(' + s.allowedComponents.join(', ') + ')</span>' : ''}</div>`;
    }
    html += `</div>`;
  }

  html += `<div class="powered"><a href="https://github.com/lucadebort/gitma" target="_blank">POWERED BY <span>GITMA</span></a></div>`;
  document.getElementById("sidebar").innerHTML = html;
}

function renderComponentCenter() {
  const c = selectedComponent;

  // Check for real component preview
  const previewFn = (typeof GITMA_PREVIEWS !== "undefined") && GITMA_PREVIEWS[c.name];
  if (previewFn) {
    try {
      const rendered = previewFn(componentState);
      document.getElementById("center").innerHTML = `<div class="preview-label">PREVIEW</div><div class="preview-area">${rendered}</div>`;
      return;
    } catch (e) {
      console.warn("Preview render failed for " + c.name + ":", e);
      // Fall through to generic card
    }
  }

  // Generic fallback: property card
  let html = `<div class="preview-label">PREVIEW</div><div class="preview-area"><div class="comp-card">`;
  html += `<div class="comp-card-name">${esc(c.name)}</div>`;
  if (c.description) html += `<div class="comp-card-desc">${esc(c.description)}</div>`;

  if (c.variants?.length) {
    html += `<div class="comp-card-section"><div class="comp-card-section-title">Variants</div>`;
    for (const v of c.variants) {
      html += `<div class="comp-card-row"><span class="comp-card-prop">${esc(v.name)}</span><span class="comp-card-value">${esc(componentState["variant:" + v.name] || "—")}</span></div>`;
    }
    html += `</div>`;
  }

  const visibleProps = (c.props || []).filter(p => p.type !== "callback" && p.type !== "object");
  if (visibleProps.length) {
    html += `<div class="comp-card-section"><div class="comp-card-section-title">Props</div>`;
    for (const p of visibleProps) {
      const val = componentState[p.name];
      const display = val === true ? "true" : val === false ? "false" : String(val ?? "—");
      html += `<div class="comp-card-row"><span class="comp-card-prop">${esc(p.name)}</span><span class="comp-card-value">${esc(display)}</span></div>`;
    }
    html += `</div>`;
  }

  const activeStates = (c.states || []).filter(s => componentState["state:" + s.name]);
  if (activeStates.length) {
    html += `<div class="comp-card-section"><div class="comp-card-section-title">Active States</div>`;
    for (const s of activeStates) {
      html += `<div class="comp-card-row"><span class="comp-card-value">${esc(s.name)}</span></div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  document.getElementById("center").innerHTML = html;
}

function renderComponentInspect() {
  const c = selectedComponent;
  let html = "";

  // Schema info
  html += `<div class="inspect-section-header">Schema</div><div class="inspect-section-body">`;
  html += ir("name", c.name);
  if (c.category) html += ir("category", c.category);
  html += ir("props", String(c.props?.length || 0));
  html += ir("variants", String(c.variants?.length || 0));
  html += ir("slots", String(c.slots?.length || 0));
  html += ir("states", String(c.states?.length || 0));
  html += `</div>`;

  // Token references
  if (c.tokenRefs?.length) {
    html += `<div class="inspect-section-header">Token References</div><div class="inspect-section-body">`;
    for (const t of c.tokenRefs) {
      html += `<div class="inspect-row"><span class="inspect-prop">${esc(t.property)}</span><span class="inspect-token">${esc(t.path)}</span></div>`;
      if (t.condition) {
        html += `<div style="padding-left:98px;font-size:9px;color:#999;margin-top:-4px;margin-bottom:4px">when ${esc(t.condition)}</div>`;
      }
    }
    html += `</div>`;
  }

  // Current state
  html += `<div class="inspect-section-header">Current State</div><div class="inspect-section-body">`;
  for (const [key, val] of Object.entries(componentState)) {
    html += ir(key, String(val));
  }
  html += `</div>`;

  document.getElementById("rightpanel").innerHTML = html;
}

function updateComponentCode() {
  const c = selectedComponent;
  const lines = [];
  for (const v of c.variants || []) {
    const val = componentState["variant:" + v.name];
    if (val && val !== v.values?.[0]) {
      lines.push(`  <span class="prop">${v.name}</span>=<span class="str">"${val}"</span>`);
    }
  }
  for (const p of c.props || []) {
    if (p.type === "callback") continue;
    const val = componentState[p.name];
    if (p.type === "string") lines.push(`  <span class="prop">${p.name}</span>=<span class="str">"${val}"</span>`);
    else if (p.type === "boolean" && val !== p.defaultValue) lines.push(`  <span class="prop">${p.name}</span>={<span class="str">${val}</span>}`);
    else if (p.type === "number") lines.push(`  <span class="prop">${p.name}</span>={<span class="str">${val}</span>}`);
    else if (p.type === "enum") lines.push(`  <span class="prop">${p.name}</span>=<span class="str">"${val}"</span>`);
  }
  for (const s of c.states || []) {
    if (componentState["state:" + s.name]) {
      lines.push(`  <span class="prop">${s.name}</span>`);
    }
  }
  document.getElementById("code-output").innerHTML = `<span class="tag">&lt;</span><span class="comp">${c.name}</span>\n${lines.join("\n")}\n<span class="tag">/&gt;</span>`;
}

function setProp(name, value) {
  componentState[name] = value;
  renderComponentSidebar();
  renderComponentCenter();
  renderComponentInspect();
  updateComponentCode();
}

function setVar(key, value) {
  componentState[key] = value;
  renderComponentSidebar();
  renderComponentCenter();
  renderComponentInspect();
  updateComponentCode();
}

// ==================== TOKEN PAGE ====================
function getAllTokens() {
  const all = [];
  for (const [colName, col] of Object.entries(GITMA_TOKEN_DATA)) {
    for (const [catName, tokens] of Object.entries(col.categories)) {
      for (const t of tokens) all.push({...t, collection: colName, category: catName});
    }
  }
  return all;
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128;
}

function renderTokenSidebar() {
  let cats = "";
  for (const [colName, col] of Object.entries(GITMA_TOKEN_DATA)) {
    cats += `<div class="nav-section">${esc(colName)}</div>`;
    for (const [catName, tokens] of Object.entries(col.categories)) {
      const key = colName + "/" + catName;
      cats += `<div class="cat-item${tokenCat===key?" active":""}" onclick="tokenCat=tokenCat==='${key}'?null:'${key}';showPage('tokens')"><span>${esc(catName)}</span><span class="cat-count">${tokens.length}</span></div>`;
    }
  }
  const total = getAllTokens(), colors = total.filter(t => t.resolvedType==="COLOR");

  let modeToggle = "";
  if (allModes.length > 1) {
    modeToggle = `<div class="mode-toggle">`;
    for (const m of allModes) {
      modeToggle += `<button class="mode-btn${tokenMode===m?" active":""}" onclick="tokenMode='${esc(m)}';showPage('tokens')">${esc(m)}</button>`;
    }
    modeToggle += `</div>`;
  }

  document.getElementById("sidebar").innerHTML = `
    <button class="back-btn" onclick="showPage('list')"><svg width="12" height="12"><use href="#icon-arrow-left"/></svg> All</button>
    <h1 style="font-size:16px;margin-bottom:2px">Design Tokens</h1>
    <p style="font-size:11px;color:#999;margin-bottom:14px">${total.length} tokens, ${Object.keys(GITMA_TOKEN_DATA).length} collections</p>
    ${modeToggle}
    <input class="control" type="text" placeholder="Search tokens..." value="${tokenSearch}" oninput="tokenSearch=this.value;renderTokenCenter()" style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;outline:none;margin-bottom:14px">
    ${cats}
    <div class="powered"><a href="https://github.com/lucadebort/gitma" target="_blank">POWERED BY <span>GITMA</span></a></div>`;
}

function renderTkVal(v) {
  if (!v) return `<div class="token-value">—</div>`;
  if (v.type === "COLOR") return `<div class="token-value"><span class="token-swatch" style="background:${v.hex}"></span><span class="token-hex">${v.hex}</span></div>`;
  if (v.type === "FLOAT") return `<div class="token-value"><span style="color:#555;font-family:monospace;font-size:11px">${v.value}${v.value>0&&v.value<=384?"px":""}</span></div>`;
  if (v.ref) return `<div class="token-value"><span style="color:#7c3aed;font-size:10px">&rarr; ${v.ref}</span></div>`;
  return `<div class="token-value">${JSON.stringify(v)}</div>`;
}

function renderTokenCenter() {
  let tokens = getAllTokens();
  if (tokenCat) { const [col,cat] = tokenCat.split("/"); tokens = tokens.filter(t => t.collection===col && t.category===cat); }
  if (tokenSearch) tokens = tokens.filter(t => t.fullName.toLowerCase().includes(tokenSearch.toLowerCase()));
  const colors = tokens.filter(t => t.resolvedType==="COLOR"), floats = tokens.filter(t => t.resolvedType==="FLOAT");
  const alt = allModes.find(m => m !== tokenMode) || tokenMode;

  let h = `<div class="token-main">`;
  h += `<div class="token-stats"><div class="token-stat"><div class="token-stat-value">${tokens.length}</div><div class="token-stat-label">Tokens</div></div><div class="token-stat"><div class="token-stat-value">${colors.length}</div><div class="token-stat-label">Colors</div></div><div class="token-stat"><div class="token-stat-value">${floats.length}</div><div class="token-stat-label">Numbers</div></div></div>`;

  if (tokenCat && colors.length > 2 && colors.length === tokens.length) {
    h += `<div class="color-scale">`;
    for (const t of colors) {
      const v = t.values[tokenMode];
      if (v?.hex) {
        const tc = isLightColor(v.hex) ? "#000" : "#fff";
        h += `<div class="color-scale-item" style="background:${v.hex}" title="${t.fullName}: ${v.hex}"><div class="color-scale-label" style="color:${tc}">${esc(t.name)}</div></div>`;
      }
    }
    h += `</div>`;
  }

  if (!tokens.length) {
    h += `<div class="token-empty"><h3 style="font-size:16px;color:#333;margin-bottom:4px">No tokens found</h3><p>Try a different search or category.</p></div>`;
  } else {
    h += `<div class="token-grid"><div class="token-row header"><span>Token</span><span>${esc(tokenMode)}</span><span>${esc(alt)}</span><span></span></div>`;
    for (const t of tokens) {
      h += `<div class="token-row"><div><div class="token-name">${esc(t.name)}</div><div class="token-path">${esc(t.fullName)}</div>${t.description?`<div class="token-desc">${esc(t.description)}</div>`:""}</div>${renderTkVal(t.values[tokenMode])}${renderTkVal(t.values[alt])}<button class="token-copy" onclick="copyTk(this,'${esc(t.fullName)}')" title="Copy path"><svg><use href="#icon-copy"/></svg></button></div>`;
    }
    h += `</div>`;
  }
  h += `</div>`;
  document.getElementById("center").innerHTML = h;
}

function copyTk(btn, p) {
  navigator.clipboard.writeText(p).then(() => {
    btn.classList.add("copied");
    setTimeout(() => btn.classList.remove("copied"), 1200);
  });
}

// ==================== HELPERS ====================
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function ir(prop, value) {
  return `<div class="inspect-row"><span class="inspect-prop">${esc(prop)}</span><span class="inspect-value">${esc(value)}</span></div>`;
}

function describeComponent(c) {
  const parts = [];
  if (c.props?.length) parts.push(c.props.length + " props");
  if (c.variants?.length) parts.push(c.variants.length + " variants");
  if (c.slots?.length) parts.push(c.slots.length + " slots");
  if (c.states?.length) parts.push(c.states.length + " states");
  if (c.tokenRefs?.length) parts.push(c.tokenRefs.length + " tokens");
  return parts.join(", ") || "empty";
}

// ==================== CODE DOCK ====================
function toggleDock() {
  dockOpen = !dockOpen;
  document.getElementById("dock-body").style.display = dockOpen ? "" : "none";
  document.getElementById("dock-arrow").innerHTML = dockOpen ? "&#9660;" : "&#9650;";
}
function copyCode() {
  const t = document.getElementById("code-output").innerText;
  navigator.clipboard.writeText(t).then(() => {
    const b = document.getElementById("copy-btn");
    b.textContent = "Copied!";
    b.classList.add("copied");
    setTimeout(() => { b.textContent = "Copy"; b.classList.remove("copied"); }, 1500);
  });
}

// ==================== INIT ====================
showPage("list");
</script>
